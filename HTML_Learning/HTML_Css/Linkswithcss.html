
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>colorlink</title>
    <style>
        a:link {
            color:black;
            background-color: white;
            text-decoration: none;
        }
        a:visited {
            color:pink;
            background-color: transparent;
            text-decoration: none;
        }
        a:hover {
            color:green;
            background-color: white;
            text-decoration: underline;
        }
        a:active {
            color:none;
            background-color: transparent;
            text-decoration: none;
        }
    </style>
</head>
<body>
    <h1>HTML Link Colors</h1>
    <h2>1.Html links are making colorful with css properties</h2>
    <p>You want to book the movie show in few minutes, then visit <a href="https://in.bookmyshow.com/" target="_blank">BookMyShow</a></p>

    <h2>2.Html buttons making colorful with css properties</h2>
    <p>Process is same as making link colors and uses same properties</p>
</body>
</html>
